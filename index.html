<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Visualize time across multiple timezones with an interactive, draggable timeline">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
  <title>Meridian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <div class="noise-overlay" aria-hidden="true"></div>
    <header class="header">
      <div class="header-left">
        <h1>Meridian</h1>
      </div>
      <div class="header-right">
        <time class="local-time" aria-live="polite"></time>
        <label class="weekend-toggle" title="Dim weekend days">
          <input type="checkbox" id="toggle-weekends" />
          <span>Darken weekends</span>
        </label>
        <button class="back-to-now hidden" aria-label="Return to current time" role="status">Back to now</button>
        <span class="work-hours-legend" title="Working hours (9 AM – 5 PM)">9–5</span>
        <button class="add-tz-btn" title="Add timezones" aria-label="Add timezones">
          <span class="add-tz-icon">+</span>
          <span class="tz-count-badge"></span>
        </button>
      </div>
    </header>
    <div class="tz-panel-backdrop hidden"></div>
    <div class="tz-panel hidden" role="dialog" aria-label="Timezone picker">
      <div class="tz-panel-handle" aria-hidden="true"><span></span></div>
      <div class="tz-panel-header">
        <h2>Timezones</h2>
        <button class="tz-panel-close" aria-label="Close timezone panel">&times;</button>
      </div>
      <div class="tz-search-wrapper">
        <input type="text" class="tz-search" placeholder="Search cities or timezones..." autocomplete="off" aria-label="Search timezones" />
        <button class="tz-search-clear hidden" aria-label="Clear search">&times;</button>
      </div>
      <div class="tz-panel-actions">
        <button class="tz-select-all">Select all</button>
      </div>
      <div class="tz-list"></div>
    </div>
    <div class="grid-container">
      <div class="now-line"><span class="now-label">NOW</span></div>
      <div class="grid-rows"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
